<svg id="gitslice-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
                    <defs>
                        <!-- Gradients -->
                        <linearGradient id="mainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#2A2F35"/>
                            <stop offset="100%" stop-color="#161B22"/>
                        </linearGradient>

                        <linearGradient id="sliceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#FF7B72"/>
                            <stop offset="100%" stop-color="#FFA657"/>
                        </linearGradient>

                        <!-- Shadow for depth -->
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="-1.5" dy="2.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.6"/>
                        </filter>

                        <!-- Masks to perfectly cut the shape diagonally -->
                        <mask id="keep-slice">
                            <rect x="-20" y="-20" width="140" height="140" fill="black"/>
                            <polygon points="10,-20 120,-20 120,90" fill="white"/>
                        </mask>

                        <mask id="keep-main">
                            <rect x="-20" y="-20" width="140" height="140" fill="black"/>
                            <polygon points="10,-20 120,90 120,130 -20,130 -20,-20" fill="white"/>
                        </mask>
                    </defs>

                    <!-- Main Folder (Bottom-Left) -->
                    <g mask="url(#keep-main)">
                        <path d="M 12 25 C 12 21 15 18 19 18 L 38 18 C 40 18 42 19.5 43 21.5 L 46 28 L 81 28 C 85 28 88 31 88 35 L 88 78 C 88 82 85 85 81 85 L 19 85 C 15 85 12 82 12 78 Z" fill="url(#mainGrad)" stroke="#3E444D" stroke-width="1.5"/>
                        <g>
                            <path d="M 32 65 L 32 50 C 32 44 36 40 42 40 L 78 40" fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round"/>
                            <circle cx="32" cy="65" r="5.5" fill="#FFFFFF"/>
                            <circle cx="78" cy="40" r="6.5" fill="#FFFFFF"/>
                            <circle cx="78" cy="40" r="3" fill="#FF7B72"/>
                        </g>
                    </g>

                    <!-- Extracted Slice (Top-Right) -->
                    <g transform="translate(6, -6)" filter="url(#shadow)">
                        <g mask="url(#keep-slice)">
                            <path d="M 12 25 C 12 21 15 18 19 18 L 38 18 C 40 18 42 19.5 43 21.5 L 46 28 L 81 28 C 85 28 88 31 88 35 L 88 78 C 88 82 85 85 81 85 L 19 85 C 15 85 12 82 12 78 Z" fill="url(#sliceGrad)"/>
                            <g>
                                <path d="M 32 65 L 32 50 C 32 44 36 40 42 40 L 78 40" fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round"/>
                                <circle cx="32" cy="65" r="5.5" fill="#FFFFFF"/>
                                <circle cx="78" cy="40" r="6.5" fill="#FFFFFF"/>
                                <circle cx="78" cy="40" r="3" fill="#FF7B72"/>
                            </g>
                        </g>
                    </g>
                </svg>